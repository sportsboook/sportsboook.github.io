<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SportsBook Loader</title>
  <!-- Google Fonts link -->
  <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="logo-container">
  <img src="sportsbook.png" alt="SportsBook Logo" class="logo">
</div>

<div id="cms-loader">
  <div class="loader-popup">
    <!-- Logo -->
    <img src="SportsBook.png" class="loader-popup-img" alt="SportBook">

    <!-- Golden loading bar -->
    <div class="loader-goldbar">
      <div id="football"></div>
    </div>
    <!-- Gradient text -->
    <div class="loader-enjoy">SportsBook</div>

    <!-- Developed by line -->
    <div class="loader-developed">
      Developed by <span class="dev-bold">ᴘᴇɴᴛɪᴜᴍ</span>
    </div>

<div class="footer-text">Website Under Development</div>

    <!-- Copyright line -->
    <div class="loader-copyright">
      © 2026 SportsBook
    </div>
  </div>
</div>

<div class="content">
  <h1>Welcome to SportBook</h1>
</div>
</body>
</html>
